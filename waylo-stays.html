<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
  <script>
  (function() {
    const correct = "waylo2026";
    const attempt = prompt("Enter password to access Waylo:");
    if (attempt !== correct) {
      document.documentElement.innerHTML = "<div style='background:#080b0d;min-height:100vh;display:flex;align-items:center;justify-content:center'><h2 style='font-family:sans-serif;color:white;text-align:center'>Access denied.<br><span style='font-size:14px;color:#666'>Incorrect or no password entered.</span></h2></div>";
      document.title = "Access Denied";
    }
  })();
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Waylo — Find Your Stay · Lisbon</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0a0d0f;
  --surface:#111518;
  --surface2:#181d21;
  --surface3:#1f262c;
  --surface4:#252e35;
  --border:rgba(255,255,255,0.07);
  --border2:rgba(255,255,255,0.12);
  --accent:#00e5a0;
  --accent2:#00b87a;
  --accent-dim:rgba(0,229,160,0.12);
  --warn:#f5a623;
  --warn-dim:rgba(245,166,35,0.12);
  --text:#eef1f3;
  --text2:#8a9099;
  --text3:#4a5260;
  --blue:#4da6ff;
  --blue-dim:rgba(77,166,255,0.1);
  --pink:#ff6eb4;
  --pink-dim:rgba(255,110,180,0.1);
  --metro:#ff4b6e;
  --bus:#ffa040;
  --airbnb:#ff5a5f;
  --hotel:#4da6ff;
  --radius:12px;
  --radius-sm:8px;
  --panel:320px;
}
html,body{height:100%;overflow:hidden;}
body{
  font-family:'DM Sans',sans-serif;
  background:var(--bg);
  color:var(--text);
  display:flex;
  flex-direction:column;
}

/* ── HEADER ── */
header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:14px 24px;
  border-bottom:1px solid var(--border);
  z-index:50;
  flex-shrink:0;
  background:var(--bg);
}
.logo{
  font-family:'Syne',sans-serif;
  font-weight:800;
  font-size:20px;
  letter-spacing:-0.5px;
  display:flex;
  align-items:center;
  gap:7px;
}
.logo-dot{width:7px;height:7px;background:var(--accent);border-radius:50%;animation:pulse 2s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.5;transform:scale(.8);}}

.header-context{
  display:flex;
  align-items:center;
  gap:10px;
  background:var(--surface);
  border:1px solid var(--border2);
  border-radius:var(--radius-sm);
  padding:8px 14px;
  font-size:13px;
  color:var(--text2);
}
.header-context strong{color:var(--text);font-weight:500;}
.header-context .divider{color:var(--text3);margin:0 4px;}
.flight-tag{
  background:var(--accent-dim);
  color:var(--accent);
  border:1px solid rgba(0,229,160,0.2);
  border-radius:20px;
  padding:3px 10px;
  font-size:11px;
  font-weight:600;
  letter-spacing:0.3px;
}

.header-actions{display:flex;gap:8px;}
.hdr-btn{
  background:var(--surface);
  border:1px solid var(--border);
  color:var(--text2);
  font-family:'DM Sans',sans-serif;
  font-size:12px;
  padding:7px 14px;
  border-radius:var(--radius-sm);
  cursor:pointer;
  transition:all .2s;
}
.hdr-btn:hover{border-color:var(--border2);color:var(--text);}
.hdr-btn.accent{background:var(--accent);color:#051a0f;font-weight:600;border-color:var(--accent);}
.hdr-btn.accent:hover{background:#00f5ad;}

/* ── MAIN LAYOUT ── */
.main{
  display:flex;
  flex:1;
  overflow:hidden;
}

/* ── LEFT PANEL ── */
.panel{
  width:var(--panel);
  flex-shrink:0;
  background:var(--surface);
  border-right:1px solid var(--border);
  display:flex;
  flex-direction:column;
  overflow:hidden;
}

.panel-top{
  padding:16px;
  border-bottom:1px solid var(--border);
  flex-shrink:0;
}

.panel-search{
  display:flex;
  gap:8px;
  margin-bottom:12px;
}

.panel-input{
  flex:1;
  background:var(--surface2);
  border:1px solid var(--border);
  border-radius:var(--radius-sm);
  padding:9px 12px;
  color:var(--text);
  font-family:'DM Sans',sans-serif;
  font-size:13px;
  outline:none;
  transition:border-color .2s;
}
.panel-input:focus{border-color:rgba(0,229,160,0.4);}
.panel-input::placeholder{color:var(--text3);}

.filter-row{
  display:flex;
  gap:6px;
  flex-wrap:wrap;
}
.filter-chip{
  background:var(--surface2);
  border:1px solid var(--border);
  color:var(--text2);
  font-size:11px;
  font-weight:500;
  padding:5px 10px;
  border-radius:20px;
  cursor:pointer;
  transition:all .2s;
  white-space:nowrap;
}
.filter-chip.active{border-color:var(--accent);color:var(--accent);background:var(--accent-dim);}
.filter-chip:hover{border-color:var(--border2);color:var(--text);}

.sort-row{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:10px 16px;
  border-bottom:1px solid var(--border);
  flex-shrink:0;
}
.sort-label{font-size:11px;color:var(--text3);}
.sort-select{
  background:var(--surface2);
  border:1px solid var(--border);
  color:var(--text2);
  font-family:'DM Sans',sans-serif;
  font-size:11px;
  padding:4px 8px;
  border-radius:6px;
  outline:none;
  cursor:pointer;
}

/* ── LISTING CARDS ── */
.listings{
  flex:1;
  overflow-y:auto;
  padding:10px;
}
.listings::-webkit-scrollbar{width:4px;}
.listings::-webkit-scrollbar-track{background:transparent;}
.listings::-webkit-scrollbar-thumb{background:var(--surface3);border-radius:2px;}

.listing-card{
  background:var(--surface2);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:14px;
  margin-bottom:8px;
  cursor:pointer;
  transition:all .2s;
  position:relative;
  animation:fadeUp .3s ease-out both;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.listing-card:nth-child(1){animation-delay:.05s;}
.listing-card:nth-child(2){animation-delay:.1s;}
.listing-card:nth-child(3){animation-delay:.15s;}
.listing-card:nth-child(4){animation-delay:.2s;}
.listing-card:nth-child(5){animation-delay:.25s;}
.listing-card:nth-child(6){animation-delay:.3s;}

.listing-card:hover{border-color:var(--border2);background:var(--surface3);}
.listing-card.active{border-color:rgba(0,229,160,0.4);background:rgba(0,229,160,0.04);}

.listing-card-top{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  margin-bottom:10px;
  gap:8px;
}
.listing-name{
  font-family:'Syne',sans-serif;
  font-size:13px;
  font-weight:700;
  line-height:1.3;
  flex:1;
}
.listing-price{
  font-family:'Syne',sans-serif;
  font-size:15px;
  font-weight:800;
  color:var(--text);
  flex-shrink:0;
  text-align:right;
}
.listing-price span{
  font-family:'DM Sans',sans-serif;
  font-size:10px;
  font-weight:400;
  color:var(--text3);
  display:block;
}

.listing-type-badge{
  display:inline-flex;
  align-items:center;
  gap:4px;
  font-size:10px;
  font-weight:600;
  padding:3px 8px;
  border-radius:20px;
  margin-bottom:8px;
  letter-spacing:0.3px;
}
.badge-airbnb{background:rgba(255,90,95,0.12);color:#ff5a5f;border:1px solid rgba(255,90,95,0.2);}
.badge-hotel{background:var(--blue-dim);color:var(--blue);border:1px solid rgba(77,166,255,0.2);}

.listing-stats{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:6px;
}
.stat-item{
  display:flex;
  align-items:center;
  gap:5px;
  font-size:11px;
  color:var(--text2);
}
.stat-icon{font-size:10px;flex-shrink:0;}
.stat-good{color:var(--accent);}
.stat-warn{color:var(--warn);}
.stat-bad{color:#ff5c5c;}

.listing-transit{
  margin-top:10px;
  padding-top:10px;
  border-top:1px solid var(--border);
}
.transit-line-chips{
  display:flex;
  gap:4px;
  flex-wrap:wrap;
}
.transit-chip{
  font-size:10px;
  font-weight:700;
  padding:2px 7px;
  border-radius:4px;
  letter-spacing:0.3px;
}
.t-metro{background:rgba(255,75,110,0.15);color:var(--metro);border:1px solid rgba(255,75,110,0.2);}
.t-bus{background:rgba(255,160,64,0.12);color:var(--bus);border:1px solid rgba(255,160,64,0.2);}
.t-tram{background:rgba(77,166,255,0.12);color:var(--blue);border:1px solid rgba(77,166,255,0.2);}

.safety-bar{
  display:flex;
  align-items:center;
  gap:6px;
  margin-top:8px;
}
.safety-label{font-size:10px;color:var(--text3);min-width:42px;}
.safety-track{
  flex:1;
  height:3px;
  background:var(--surface4);
  border-radius:2px;
  overflow:hidden;
}
.safety-fill{height:100%;border-radius:2px;transition:width .6s ease;}
.safety-score{font-size:10px;font-weight:600;min-width:24px;text-align:right;}

/* ── MAP AREA ── */
.map-area{
  flex:1;
  position:relative;
  overflow:hidden;
  background:#0d1117;
}

/* Simulated map using CSS grid of blocks */
.map-canvas{
  width:100%;
  height:100%;
  position:relative;
  background:#0d1117;
}

/* Street grid overlay */
.map-canvas::before{
  content:'';
  position:absolute;
  inset:0;
  background-image:
    linear-gradient(rgba(255,255,255,0.025) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,255,255,0.025) 1px,transparent 1px);
  background-size:60px 60px;
  pointer-events:none;
}

/* City blocks */
.city-block{
  position:absolute;
  border-radius:4px;
  background:var(--surface2);
  border:1px solid var(--border);
}

/* Distance rings */
.dist-ring{
  position:absolute;
  border-radius:50%;
  border:1px dashed;
  pointer-events:none;
  display:flex;
  align-items:flex-start;
  justify-content:flex-end;
  transform:translate(-50%,-50%);
}
.ring-label{
  font-size:9px;
  font-weight:600;
  letter-spacing:0.5px;
  padding:2px 5px;
  border-radius:4px;
  margin:4px;
}

/* Airport marker */
.airport-marker{
  position:absolute;
  transform:translate(-50%,-50%);
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:3px;
  z-index:20;
  cursor:default;
}
.airport-pin{
  width:36px;
  height:36px;
  background:var(--surface);
  border:2px solid rgba(77,166,255,0.6);
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:16px;
  box-shadow:0 0 0 6px rgba(77,166,255,0.08);
}
.airport-label{
  font-size:9px;
  font-weight:700;
  letter-spacing:0.8px;
  color:var(--blue);
  background:var(--surface);
  border:1px solid rgba(77,166,255,0.2);
  padding:2px 6px;
  border-radius:4px;
}

/* Transit stops */
.transit-stop{
  position:absolute;
  transform:translate(-50%,-50%);
  z-index:15;
  cursor:pointer;
  transition:transform .2s;
}
.transit-stop:hover{transform:translate(-50%,-50%) scale(1.3);}

.metro-pin{
  width:14px;height:14px;
  border-radius:50%;
  background:var(--metro);
  border:2px solid rgba(255,75,110,0.3);
  box-shadow:0 0 6px rgba(255,75,110,0.4);
}
.bus-pin{
  width:10px;height:10px;
  border-radius:3px;
  background:var(--bus);
  border:1px solid rgba(255,160,64,0.4);
}
.tram-pin{
  width:10px;height:10px;
  border-radius:50%;
  background:var(--blue);
  border:1px solid rgba(77,166,255,0.4);
}

/* Accommodation pins */
.stay-pin{
  position:absolute;
  transform:translate(-50%,-100%);
  z-index:25;
  cursor:pointer;
  transition:all .2s;
}
.stay-pin:hover{transform:translate(-50%,-100%) scale(1.1);}
.stay-pin.active-pin .pin-bubble{
  background:var(--accent);
  color:#051a0f;
  border-color:var(--accent2);
  box-shadow:0 4px 16px rgba(0,229,160,0.4);
}

.pin-bubble{
  background:var(--surface);
  border:1.5px solid var(--border2);
  color:var(--text);
  font-family:'Syne',sans-serif;
  font-size:11px;
  font-weight:700;
  padding:5px 9px;
  border-radius:8px;
  white-space:nowrap;
  box-shadow:0 2px 8px rgba(0,0,0,0.5);
  transition:all .2s;
}
.pin-bubble::after{
  content:'';
  position:absolute;
  bottom:-6px;
  left:50%;
  transform:translateX(-50%);
  border:4px solid transparent;
  border-top-color:var(--border2);
}
.pin-bubble.airbnb-pin{border-color:rgba(255,90,95,0.4);}
.pin-bubble.hotel-pin{border-color:rgba(77,166,255,0.4);}

/* ── MAP CONTROLS ── */
.map-controls{
  position:absolute;
  top:16px;
  right:16px;
  display:flex;
  flex-direction:column;
  gap:8px;
  z-index:30;
}

.map-layer-panel{
  background:var(--surface);
  border:1px solid var(--border2);
  border-radius:var(--radius);
  padding:14px;
  min-width:180px;
}

.layer-title{
  font-size:10px;
  font-weight:600;
  letter-spacing:1px;
  text-transform:uppercase;
  color:var(--text3);
  margin-bottom:10px;
}

.layer-toggle{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-bottom:8px;
  cursor:pointer;
  user-select:none;
}
.layer-toggle:last-child{margin-bottom:0;}

.layer-info{
  display:flex;
  align-items:center;
  gap:7px;
  font-size:12px;
  color:var(--text2);
}
.layer-dot{
  width:8px;height:8px;
  border-radius:50%;
  flex-shrink:0;
}

/* Toggle switch */
.toggle{
  width:28px;height:16px;
  background:var(--surface3);
  border-radius:8px;
  position:relative;
  transition:background .2s;
  flex-shrink:0;
}
.toggle.on{background:var(--accent);}
.toggle::after{
  content:'';
  position:absolute;
  top:2px;left:2px;
  width:12px;height:12px;
  background:#fff;
  border-radius:50%;
  transition:left .2s;
}
.toggle.on::after{left:14px;}

.zoom-btns{
  display:flex;
  flex-direction:column;
  background:var(--surface);
  border:1px solid var(--border2);
  border-radius:var(--radius-sm);
  overflow:hidden;
}
.zoom-btn{
  background:none;
  border:none;
  color:var(--text2);
  font-size:16px;
  padding:8px 12px;
  cursor:pointer;
  transition:all .2s;
  border-bottom:1px solid var(--border);
  line-height:1;
}
.zoom-btn:last-child{border-bottom:none;}
.zoom-btn:hover{background:var(--surface2);color:var(--text);}

/* ── MAP TOOLTIP ── */
.map-tooltip{
  position:absolute;
  background:var(--surface);
  border:1px solid var(--border2);
  border-radius:var(--radius);
  padding:14px;
  width:220px;
  z-index:40;
  pointer-events:none;
  opacity:0;
  transition:opacity .15s;
  box-shadow:0 8px 24px rgba(0,0,0,0.5);
}
.map-tooltip.visible{opacity:1;}
.tt-name{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;margin-bottom:4px;}
.tt-type{font-size:11px;color:var(--text2);margin-bottom:10px;}
.tt-stats{display:flex;flex-direction:column;gap:5px;}
.tt-stat{display:flex;justify-content:space-between;font-size:11px;}
.tt-stat-label{color:var(--text3);}
.tt-stat-val{color:var(--text);font-weight:500;}

/* ── DETAIL DRAWER ── */
.detail-drawer{
  position:absolute;
  bottom:0;left:0;right:0;
  background:var(--surface);
  border-top:1px solid var(--border2);
  border-radius:16px 16px 0 0;
  padding:20px 24px;
  z-index:35;
  transform:translateY(100%);
  transition:transform .3s cubic-bezier(.4,0,.2,1);
  max-height:55%;
  overflow-y:auto;
}
.detail-drawer.open{transform:translateY(0);}

.drawer-handle{
  width:36px;height:3px;
  background:var(--surface4);
  border-radius:2px;
  margin:0 auto 16px;
}
.drawer-header{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  margin-bottom:16px;
}
.drawer-title{
  font-family:'Syne',sans-serif;
  font-size:18px;
  font-weight:800;
}
.drawer-price{
  text-align:right;
}
.drawer-price .big{
  font-family:'Syne',sans-serif;
  font-size:22px;
  font-weight:800;
  color:var(--accent);
}
.drawer-price .small{font-size:11px;color:var(--text3);}

.drawer-stats{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
  margin-bottom:16px;
}
.d-stat{
  background:var(--surface2);
  border-radius:var(--radius-sm);
  padding:10px;
  text-align:center;
}
.d-stat-val{
  font-family:'Syne',sans-serif;
  font-size:16px;
  font-weight:700;
  margin-bottom:3px;
}
.d-stat-label{font-size:10px;color:var(--text3);}

.drawer-transit{margin-bottom:16px;}
.drawer-transit-title{
  font-size:11px;
  font-weight:600;
  letter-spacing:0.8px;
  text-transform:uppercase;
  color:var(--text3);
  margin-bottom:8px;
}
.transit-stop-list{display:flex;flex-direction:column;gap:6px;}
.transit-stop-row{
  display:flex;
  align-items:center;
  justify-content:space-between;
  background:var(--surface2);
  border-radius:var(--radius-sm);
  padding:8px 12px;
  font-size:12px;
}
.transit-stop-row-left{display:flex;align-items:center;gap:8px;color:var(--text2);}
.transit-walk{font-size:11px;color:var(--text3);}

.drawer-actions{display:flex;gap:10px;}
.drawer-btn{
  flex:1;
  padding:12px;
  border-radius:var(--radius-sm);
  font-family:'Syne',sans-serif;
  font-size:13px;
  font-weight:700;
  cursor:pointer;
  transition:all .2s;
  border:none;
}
.drawer-btn.primary{background:var(--accent);color:#051a0f;}
.drawer-btn.primary:hover{background:#00f5ad;}
.drawer-btn.secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border2);}
.drawer-btn.secondary:hover{border-color:var(--accent);color:var(--accent);}

/* ── API NOTE ── */
.api-note{
  position:absolute;
  bottom:16px;left:16px;
  background:var(--surface);
  border:1px dashed var(--border2);
  border-radius:var(--radius-sm);
  padding:8px 12px;
  font-size:10px;
  color:var(--text3);
  max-width:260px;
  z-index:20;
  line-height:1.5;
}
.api-note code{
  font-size:9px;
  background:var(--surface2);
  padding:1px 5px;
  border-radius:3px;
  color:var(--blue);
}

/* ── LEGEND ── */
.map-legend{
  position:absolute;
  bottom:16px;
  right:16px;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius-sm);
  padding:10px 14px;
  z-index:20;
  display:flex;
  flex-direction:column;
  gap:6px;
}
.legend-item{
  display:flex;
  align-items:center;
  gap:7px;
  font-size:11px;
  color:var(--text2);
}

@media(max-width:768px){
  .panel{display:none;}
  .map-controls{top:10px;right:10px;}
}
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="logo"><span class="logo-dot"></span>Waylo</div>

  <div class="header-context">
    <strong>Lisbon, Portugal</strong>
    <span class="divider">·</span>
    <span>Apr 15 – Apr 22</span>
    <span class="divider">·</span>
    <span>1 guest</span>
    <span class="flight-tag">✈ LATAM split · $500</span>

// ── RENDER LISTINGS ───────────────────────────────────────────────────────
function renderListings() {
  let data = [...STAYS];

  if (activeFilter === 'airbnb') data = data.filter(s => s.type === 'airbnb');
  else if (activeFilter === 'hotel') data = data.filter(s => s.type === 'hotel');
  else if (activeFilter === 'budget') data = data.filter(s => s.price < 80);
  else if (activeFilter === 'transit') data = data.filter(s => s.walkTransit <= 5);

  if (currentSort === 'price') data.sort((a,b) => a.price - b.price);
  else if (currentSort === 'transit') data.sort((a,b) => a.walkTransit - b.walkTransit);
  else if (currentSort === 'safety') data.sort((a,b) => b.safetyScore - a.safetyScore);
  else if (currentSort === 'airport') data.sort((a,b) => parseFloat(a.distAirport) - parseFloat(b.distAirport));

  document.getElementById('listing-count').textContent = `${data.length} stay${data.length!==1?'s':''} found`;

  const container = document.getElementById('listings-container');
  container.innerHTML = '';
  data.forEach(s => container.appendChild(buildListingCard(s)));
}

  const safeColor = s.safetyScore >= 85 ? 'var(--accent)' : s.safetyScore >= 70 ? 'var(--warn)' : '#ff5c5c';
  const transitColor = s.walkTransit <= 4 ? 'stat-good' : s.walkTransit <= 7 ? '' : 'stat-warn';
  const transitBadge = s.walkTransit <= 4 ? 'stat-good' : '';

  div.innerHTML = `
    <div class="listing-card-top">
      <div class="listing-name">${s.name}</div>
      <div class="listing-price">$${s.price}<span>/ night</span></div>
    </div>
    <div class="listing-type-badge ${s.type==='airbnb'?'badge-airbnb':'badge-hotel'}">
      ${s.type==='airbnb'?'● Airbnb':'▪ Hotel'}
    </div>
    <div class="listing-stats">
      <div class="stat-item">
        <span class="stat-icon">✈</span>
        <span>${s.distAirport} from airport</span>
      </div>
      <div class="stat-item ${transitBadge}">
        <span class="stat-icon">🚇</span>
        <span>${s.walkTransit} min walk to transit</span>
      </div>
      <div class="stat-item">
        <span class="stat-icon">🚕</span>
        <span>~${s.airportMin} min to airport</span>
      </div>
      <div class="stat-item">
        <span class="stat-icon">📍</span>
        <span>${s.neighborhood}</span>
      </div>
    </div>
    <div class="listing-transit">
      <div class="transit-line-chips">
        ${s.transitLines.map(l => {
          const cls = l.startsWith('Metro') ? 't-metro' : l.startsWith('Tram') ? 't-tram' : 't-bus';
          return `<span class="transit-chip ${cls}">${l}</span>`;
        }).join('')}
      </div>
    </div>
    <div class="safety-bar">
      <span class="safety-label">Safety</span>
      <div class="safety-track">
        <div class="safety-fill" style="width:${s.safetyScore}%;background:${safeColor}"></div>
      </div>
      <span class="safety-score" style="color:${safeColor}">${s.safetyScore}</span>
    </div>
  `;
  return div;
}

// ── RENDER PINS ───────────────────────────────────────────────────────────
function renderPins() {
  const container = document.getElementById('stay-pins');
  container.innerHTML = '';
  STAYS.forEach(s => {
    const div = document.createElement('div');
    div.className = `stay-pin ${activeStay===s.id?'active-pin':''}`;
    div.id = `pin-${s.id}`;
    div.style.left = s.mapX;
    div.style.top = s.mapY;
    div.onclick = () => selectStay(s.id);

    const pinClass = s.type === 'airbnb' ? 'airbnb-pin' : 'hotel-pin';
    div.innerHTML = `<div class="pin-bubble ${pinClass}">$${s.price}</div>`;
    container.appendChild(div);
  });
}

// ── SELECT STAY ───────────────────────────────────────────────────────────
function selectStay(id) {
  activeStay = activeStay === id ? null : id;
  renderListings();
  renderPins();

  if (activeStay) {
    const s = STAYS.find(x => x.id === id);
    openDrawer(s);
    // Scroll listing into view
    setTimeout(() => {
      const card = document.querySelector('.listing-card.active');
      if (card) card.scrollIntoView({behavior:'smooth',block:'nearest'});
    }, 50);
  } else {
    closeDrawer();
  }
}

// ── DRAWER ────────────────────────────────────────────────────────────────
function openDrawer(s) {
  const safeColor = s.safetyScore >= 85 ? 'var(--accent)' : s.safetyScore >= 70 ? 'var(--warn)' : '#ff5c5c';
  const r = s.airportRoute;

  // Build Google Maps transit deep-link (stay → airport)
  const gmTransitURL = `https://www.google.com/maps/dir/?api=1&origin=${s.stayCoords}&destination=${AIRPORT_COORDS}&travelmode=transit`;
  // Google Maps driving (for taxi reference)
  const gmDrivingURL = `https://www.google.com/maps/dir/?api=1&origin=${s.stayCoords}&destination=${AIRPORT_COORDS}&travelmode=driving`;
  // Rome2rio link
  const r2rURL = `https://www.rome2rio.com/map/${encodeURIComponent(s.neighborhood+' Lisbon')}/${encodeURIComponent('Lisbon Airport')}`;
  // Citymapper link (Lisbon supported)
  const cmURL = `https://citymapper.com/directions?endcoord=${AIRPORT_COORDS}&endname=${AIRPORT_NAME}&startcoord=${s.stayCoords}&startname=${encodeURIComponent(s.name)}`;

  document.getElementById('drawer-content').innerHTML = `
    <div class="drawer-header">
      <div>
        <div class="drawer-title">${s.name}</div>
        <div style="font-size:12px;color:var(--text2);margin-top:3px">${s.neighborhood} · ${s.type==='airbnb'?'Airbnb':'Hotel'}</div>
      </div>
      <div class="drawer-price">
        <div class="big">$${s.price}</div>
        <div class="small">per night</div>
      </div>
    </div>

    <div class="drawer-stats">
      <div class="d-stat">
        <div class="d-stat-val" style="color:var(--blue)">${s.distAirport}</div>
        <div class="d-stat-label">From airport</div>
      </div>
      <div class="d-stat">
        <div class="d-stat-val" style="color:var(--accent)">${s.walkTransit} min</div>
        <div class="d-stat-label">To nearest stop</div>
      </div>
      <div class="d-stat">
        <div class="d-stat-val" style="color:${r.best.color}">${r.best.duration}</div>
        <div class="d-stat-label">Best transit time</div>
      </div>
      <div class="d-stat">
        <div class="d-stat-val" style="color:${safeColor}">${s.safetyScore}/100</div>
        <div class="d-stat-label">Safety score</div>
      </div>
    </div>

    <div class="drawer-transit" style="margin-bottom:14px">
      <div class="drawer-transit-title">Nearby transit stops</div>
      <div class="transit-stop-list">
        ${s.nearStops.map(t => {
          const icon = t.type==='metro'?'🚇':t.type==='tram'?'🚃':'🚌';
          const cls = t.type==='metro'?'t-metro':t.type==='tram'?'t-tram':'t-bus';
          return `
            <div class="transit-stop-row">
              <div class="transit-stop-row-left">${icon}
                <span class="transit-chip ${cls}" style="border-radius:4px">${t.name}</span>
              </div>
              <span class="transit-walk">${t.walk} walk</span>
            </div>`;
        }).join('')}
      </div>
    </div>

    <!-- AIRPORT TRANSIT SECTION -->
    <div style="border-top:1px solid var(--border);padding-top:14px;margin-bottom:14px">
      <div class="drawer-transit-title" style="margin-bottom:10px">✈ Getting to LIS Airport</div>

      <!-- Best option highlight -->
      <div style="background:rgba(0,229,160,0.06);border:1px solid rgba(0,229,160,0.18);border-radius:10px;padding:12px 14px;margin-bottom:10px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
          <div style="font-size:11px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:var(--accent)">Recommended</div>
          <div style="display:flex;gap:6px;align-items:center">
            <span style="font-family:'Syne',sans-serif;font-size:15px;font-weight:800;color:var(--accent)">${r.best.cost}</span>
            <span style="font-size:11px;color:var(--text3)">· ${r.best.duration}</span>
          </div>
        </div>
        <div style="font-size:12px;color:var(--text2);line-height:1.6">${r.best.icon} ${r.best.steps}</div>
      </div>

      <!-- All options table -->
      <div style="display:flex;flex-direction:column;gap:6px;margin-bottom:12px">
        ${r.options.map((o,i) => `
          <div style="display:grid;grid-template-columns:auto 1fr auto auto;gap:10px;align-items:center;background:var(--surface2);border-radius:8px;padding:10px 12px;${i===0?'border:1px solid rgba(0,229,160,0.15)':'border:1px solid var(--border)'}">
            <span style="font-size:14px">${o.icon}</span>
            <div>
              <div style="font-size:12px;font-weight:500;color:var(--text);margin-bottom:2px">${o.mode}</div>
              <div style="font-size:11px;color:var(--text3)">${o.note}</div>
            </div>
            <div style="text-align:right;white-space:nowrap">
              <div style="font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:${i===0?'var(--accent)':'var(--text)'}">${o.cost}</div>
              <div style="font-size:10px;color:var(--text3)">${o.duration}</div>
            </div>
          </div>
        `).join('')}
      </div>

      <!-- External map links -->
      <div style="margin-bottom:4px">
        <div style="font-size:10px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;color:var(--text3);margin-bottom:7px">Open route in</div>
        <div style="display:flex;gap:6px;flex-wrap:wrap">
          <a href="${gmTransitURL}" target="_blank" rel="noopener" style="display:inline-flex;align-items:center;gap:5px;background:var(--surface2);border:1px solid var(--border2);color:var(--text2);font-size:11px;font-weight:500;padding:6px 12px;border-radius:6px;text-decoration:none;transition:all .2s" onmouseover="this.style.borderColor='var(--blue)';this.style.color='var(--blue)'" onmouseout="this.style.borderColor='var(--border2)';this.style.color='var(--text2)'">
            🗺 Google Maps (transit)
          </a>
          <a href="${gmDrivingURL}" target="_blank" rel="noopener" style="display:inline-flex;align-items:center;gap:5px;background:var(--surface2);border:1px solid var(--border2);color:var(--text2);font-size:11px;font-weight:500;padding:6px 12px;border-radius:6px;text-decoration:none;transition:all .2s" onmouseover="this.style.borderColor='var(--warn)';this.style.color='var(--warn)'" onmouseout="this.style.borderColor='var(--border2)';this.style.color='var(--text2)'">
            🚕 Google Maps (taxi)
          </a>
          <a href="${cmURL}" target="_blank" rel="noopener" style="display:inline-flex;align-items:center;gap:5px;background:var(--surface2);border:1px solid var(--border2);color:var(--text2);font-size:11px;font-weight:500;padding:6px 12px;border-radius:6px;text-decoration:none;transition:all .2s" onmouseover="this.style.borderColor='var(--accent)';this.style.color='var(--accent)'" onmouseout="this.style.borderColor='var(--border2)';this.style.color='var(--text2)'">
            🏙 Citymapper
          </a>
          <a href="${r2rURL}" target="_blank" rel="noopener" style="display:inline-flex;align-items:center;gap:5px;background:var(--surface2);border:1px solid var(--border2);color:var(--text2);font-size:11px;font-weight:500;padding:6px 12px;border-radius:6px;text-decoration:none;transition:all .2s" onmouseover="this.style.borderColor='var(--metro)';this.style.color='var(--metro)'" onmouseout="this.style.borderColor='var(--border2)';this.style.color='var(--text2)'">
            🌐 Rome2rio
          </a>
        </div>
      </div>
    </div>

    <div class="drawer-actions">
      <button class="drawer-btn secondary" onclick="closeDrawer()">✕ Close</button>
      <button class="drawer-btn primary" onclick="bookStay('${s.id}')">Book on ${s.type==='airbnb'?'Airbnb':'Booking.com'} →</button>
    </div>
  `;

  document.getElementById('detail-drawer').classList.add('open');
}

function closeDrawer() {
  document.getElementById('detail-drawer').classList.remove('open');
  activeStay = null;
  renderListings();
  renderPins();
}

function bookStay(id) {
  const s = STAYS.find(x=>x.id===id);
  alert(`🔌 API note: In production, this opens ${s.type==='airbnb'?'Airbnb':'Booking.com'} with pre-filled dates (Apr 15–22) and location via affiliate deep-link.\n\nWaylo earns 3–8% commission on the booking.`);
}

// ── TRANSIT TOOLTIP ───────────────────────────────────────────────────────
function showTransitTip(name, type, el) {
  const tt = document.getElementById('map-tooltip');
  document.getElementById('tt-name').textContent = name;
  document.getElementById('tt-type').textContent = type;
  document.getElementById('tt-stats').innerHTML = `
    <div class="tt-stat"><span class="tt-stat-label">Type</span><span class="tt-stat-val">${type.split('·')[0].trim()}</span></div>
    <div class="tt-stat"><span class="tt-stat-label">Lines</span><span class="tt-stat-val">${type.split('·').slice(1).join('·').trim()||'—'}</span></div>
  `;
  const rect = el.getBoundingClientRect();
  const mapRect = document.getElementById('map-canvas').getBoundingClientRect();
  let x = rect.left - mapRect.left + 20;
  let y = rect.top - mapRect.top - 10;
  if (x + 220 > mapRect.width) x -= 240;
  tt.style.left = x+'px';
  tt.style.top = y+'px';
  tt.classList.add('visible');
  setTimeout(() => tt.classList.remove('visible'), 2500);
}

// ── LAYER TOGGLES ─────────────────────────────────────────────────────────
function toggleLayer(layer, row) {
  layerStates[layer] = !layerStates[layer];
  const tog = document.getElementById('layer-'+layer);
  if (layerStates[layer]) tog.classList.add('on');
  else tog.classList.remove('on');

  if (layer==='metro') {
    document.querySelectorAll('.metro-pin').forEach(el=>el.closest('.transit-stop').style.display=layerStates.metro?'':'none');
  } else if (layer==='bus') {
    document.querySelectorAll('.bus-pin').forEach(el=>el.closest('.transit-stop').style.display=layerStates.bus?'':'none');
  } else if (layer==='airbnb') {
    document.querySelectorAll('.airbnb-pin').forEach(el=>el.closest('.stay-pin').style.display=layerStates.airbnb?'':'none');
    if (!layerStates.airbnb) renderListingsForLayer();
    else renderListings();
  } else if (layer==='hotel') {
    document.querySelectorAll('.hotel-pin').forEach(el=>el.closest('.stay-pin').style.display=layerStates.hotel?'':'none');
  } else if (layer==='rings') {
    ['ring-3km','ring-7km','ring-15km'].forEach(id=>{
      const el=document.getElementById(id);
      if(el) el.style.display=layerStates.rings?'flex':'none';
    });
  }
}

function renderListingsForLayer() { renderListings(); }

// ── FILTER / SORT ─────────────────────────────────────────────────────────
function toggleFilter(btn, filter) {
  document.querySelectorAll('.filter-chip').forEach(c=>c.classList.remove('active'));
  btn.classList.add('active');
  activeFilter = filter;
  renderListings();
}

function sortListings(val) {
  currentSort = val;
  renderListings();
}

function filterListings() { renderListings(); }

// ── MODALS ────────────────────────────────────────────────────────────────
function showApiInfo() {
  document.getElementById('api-modal').style.display='flex';
}

function closeApiModal(e) {
  if(e.target===document.getElementById('api-modal'))
    document.getElementById('api-modal').style.display='none';
}

function saveTrip() {
  const btn = document.getElementById('save-btn');
  btn.textContent = '✓ Saved!';
  setTimeout(()=>btn.textContent='Save trip',2000);
}
</script>
</body>
</html>
