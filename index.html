<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<script>
  var p = prompt("Enter password to access Waylo:");
  if (p !== "waylo2026") { window.location.href = "index.html"; }
</script>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Waylo — Smart Flight Search</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#080b0d;--s1:#0f1316;--s2:#161b1f;--s3:#1d2429;
  --b1:rgba(255,255,255,0.06);--b2:rgba(255,255,255,0.1);
  --accent:#00e5a0;--adim:rgba(0,229,160,0.1);
  --tx:#ecf0f2;--tx2:#7c8892;--tx3:#3d4a56;
  --ok:#00c97a;--warn:#f5a623;--red:#ff5050;
  --r:12px;--rs:8px;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;}
header{display:flex;align-items:center;justify-content:space-between;padding:16px 36px;border-bottom:1px solid var(--b1);position:sticky;top:0;background:rgba(8,11,13,.96);backdrop-filter:blur(14px);z-index:60;}
.logo{font-family:'Syne',sans-serif;font-weight:800;font-size:20px;display:flex;align-items:center;gap:7px;text-decoration:none;color:var(--tx);}
.logo-dot{width:7px;height:7px;background:var(--accent);border-radius:50%;animation:pulse 2s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.5;}}
.nav{display:flex;gap:5px;}
.nav-a{font-size:12px;color:var(--tx2);text-decoration:none;padding:6px 13px;border-radius:20px;border:1px solid transparent;transition:all .2s;}
.nav-a:hover{border-color:var(--b2);color:var(--tx);}
.nav-a.on{background:var(--adim);border-color:rgba(0,229,160,.2);color:var(--accent);}
.wrap{max-width:860px;margin:0 auto;padding:40px 24px;}
.eyebrow{font-size:11px;font-weight:500;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:12px;}
h1{font-family:'Syne',sans-serif;font-size:clamp(28px,4vw,42px);font-weight:800;letter-spacing:-1.5px;margin-bottom:6px;}
h1 em{font-style:normal;color:var(--accent);}
.sub{font-size:14px;color:var(--tx2);margin-bottom:28px;}
.card{background:var(--s1);border:1px solid var(--b2);border-radius:20px;padding:24px;margin-bottom:24px;}
.row{display:grid;grid-template-columns:1fr 1fr 180px 90px;gap:10px;margin-bottom:16px;}
.fg{display:flex;flex-direction:column;gap:5px;}
.fl{font-size:10px;font-weight:600;letter-spacing:.9px;text-transform:uppercase;color:var(--tx3);}
.fi{background:var(--s2);border:1px solid var(--b1);border-radius:var(--rs);padding:11px 13px;color:var(--tx);font-family:'DM Sans',sans-serif;font-size:14px;outline:none;width:100%;}
.fi:focus{border-color:rgba(0,229,160,.4);}
.btn{width:100%;background:var(--accent);color:#041a0d;border:none;border-radius:var(--rs);padding:14px;font-family:'Syne',sans-serif;font-size:14px;font-weight:700;cursor:pointer;}
.btn:hover{background:#00f5ad;}
.btn:disabled{background:var(--s3);color:var(--tx3);cursor:not-allowed;}
#status{text-align:center;padding:20px;font-size:14px;color:var(--tx2);display:none;}
#status.show{display:block;}
.fc{background:var(--s1);border:1px solid var(--b1);border-radius:var(--r);margin-bottom:10px;overflow:hidden;}
.fc:first-child{border-color:rgba(0,229,160,.25);}
.fc-top{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;}
.fc-left{display:flex;align-items:center;gap:16px;}
.fc-times{display:flex;align-items:center;gap:12px;}
.fc-time{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;}
.fc-arrow{color:var(--tx3);font-size:12px;}
.fc-info{font-size:12px;color:var(--tx2);}
.fc-price{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;color:var(--accent);}
.fc-price.normal{color:var(--tx);}
.fc-book{border-top:1px solid var(--b1);padding:10px 20px;background:var(--s2);}
.book-link{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:500;padding:5px 12px;border-radius:6px;text-decoration:none;border:1px solid rgba(0,229,160,.2);background:var(--adim);color:var(--accent);}
.err{background:rgba(255,80,80,0.08);border:1px solid rgba(255,80,80,.2);border-radius:var(--r);padding:16px 20px;margin-bottom:16px;}
.err strong{color:var(--red);display:block;margin-bottom:4px;font-family:'Syne',sans-serif;}
.err p{font-size:13px;color:var(--tx2);}
.split-box{background:rgba(0,229,160,0.04);border:1px solid rgba(0,229,160,0.2);border-radius:var(--r);padding:16px 20px;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center;}
.split-box strong{color:var(--accent);font-family:'Syne',sans-serif;display:block;}
.split-box span{font-size:12px;color:var(--tx2);}
.split-amt{font-family:'Syne',sans-serif;font-size:24px;font-weight:800;color:var(--accent);}
@media(max-width:600px){.row{grid-template-columns:1fr 1fr;}}
</style>
</head>
<body>

<header>
  <a class="logo" href="#"><span class="logo-dot"></span>Waylo</a>
  <nav class="nav">
    <a class="nav-a on" href="#">Flights</a>
    <a class="nav-a" href="waylo-stays.html">Stays</a>
    <a class="nav-a" href="waylo-visa.html">Visas</a>
    <a class="nav-a" href="waylo-split-explainer.html">How splits work</a>
  </nav>
</header>

<div class="wrap">
  <div class="eyebrow">Your personal travel agent</div>
  <h1>Find every way to<br><em>get there cheaper.</em></h1>
  <p class="sub">Real live flight prices — split tickets, every angle searched automatically.</p>

  <div class="card">
    <div class="row">
      <div class="fg"><label class="fl">From</label><input class="fi" id="origin" value="LHR" placeholder="Airport code"></div>
      <div class="fg"><label class="fl">To</label><input class="fi" id="dest" value="CDG" placeholder="Airport code"></div>
      <div class="fg"><label class="fl">Date</label><input class="fi" id="depart" type="date" value="2026-04-20"></div>
      <div class="fg"><label class="fl">Pax</label><input class="fi" id="pax" type="number" value="1" min="1" max="9"></div>
    </div>
    <button class="btn" id="btn" onclick="go()">Search live flights →</button>
  </div>

  <div id="status">Searching...</div>
  <div id="output"></div>
</div>

<script>
// PUT YOUR RAPIDAPI KEY BETWEEN THESE QUOTES
var KEY = '0a6383f290msh1ac5b7a3a8e7eb1p181d5fjsnc2a5c9547ba4';

async function go(){
  var origin = document.getElementById('origin').value.trim().toUpperCase();
  var dest = document.getElementById('dest').value.trim().toUpperCase();
  var date = document.getElementById('depart').value;
  var pax = document.getElementById('pax').value || '1';

  if(!origin || !dest || !date){ alert('Fill in all fields.'); return; }

  var btn = document.getElementById('btn');
  var status = document.getElementById('status');
  var output = document.getElementById('output');

  btn.disabled = true;
  btn.textContent = 'Searching...';
  status.className = 'show';
  status.textContent = 'Fetching live prices from Kiwi...';
  output.innerHTML = '';

  var params = new URLSearchParams({
    source: 'Airport:' + origin,
    destination: 'Airport:' + dest,
    outboundDepartmentDateStart: date + 'T00:00:00',
    currency: 'usd',
    locale: 'en',
    adults: pax,
    children: '0',
    infants: '0',
    handbags: '1',
    holdbags: '0',
    cabinClass: 'ECONOMY',
    sortBy: 'QUALITY',
    applyMixedClasses: 'true',
    allowChangeInboundDestination: 'true',
    allowChangeInboundSource: 'true',
    allowDifferentStationConnection: 'true',
    enableSelfTransfer: 'true',
    allowOvernightStopover: 'true',
    enableTrueHiddenCity: 'true',
    allowReturnToDifferentCity: 'false',
    allowReturnFromDifferentCity: 'false',
    enableThrowAwayTicketing: 'true',
    outbound: 'SUNDAY,MONDAY,TUESDAY,WEDNESDAY,THURSDAY,FRIDAY,SATURDAY',
    transportTypes: 'FLIGHT',
    contentProviders: 'FLIXBUS_DIRECTS,FRESH,KAYAK,KIWI',
    limit: '8'
  });

  try {
    var res = await fetch('https://kiwi-com-cheap-flights.p.rapidapi.com/one-way?' + params.toString(), {
      method: 'GET',
      headers: {
        'x-rapidapi-host': 'kiwi-com-cheap-flights.p.rapidapi.com',
        'x-rapidapi-key': KEY
      }
    });

    status.textContent = 'Got response — status ' + res.status;

    if(!res.ok){
      var errText = await res.text();
      output.innerHTML = '<div class="err"><strong>API Error ' + res.status + '</strong><p>' + errText + '</p></div>';
      btn.disabled = false;
      btn.textContent = 'Search live flights →';
      status.className = '';
      return;
    }

    var data = await res.json();
    status.className = '';
    btn.disabled = false;
    btn.textContent = 'Search live flights →';

    if(!data.data || data.data.length === 0){
      output.innerHTML = '<div class="err"><strong>No results</strong><p>No flights found for ' + origin + ' → ' + dest + ' on ' + date + '. Try LHR → CDG which is a very common route.</p></div>';
      return;
    }

    var html = '<p style="font-size:13px;color:var(--tx2);margin-bottom:14px">' + data.data.length + ' live fares found · ' + origin + ' → ' + dest + '</p>';

    data.data.forEach(function(f, i){
      var price = Math.round(f.price || 0);
      var airline = (f.airlines && f.airlines[0]) ? f.airlines[0] : 'Unknown';
      var depart = f.local_departure ? f.local_departure.substring(11,16) : '--:--';
      var arrive = f.local_arrival ? f.local_arrival.substring(11,16) : '--:--';
      var stops = f.route ? Math.max(f.route.length-1,0) : 0;
      var stopTxt = stops===0 ? 'Nonstop' : stops+' stop'+(stops>1?'s':'');
      var dur = f.duration && f.duration.departure ? Math.floor(f.duration.departure/3600)+'h '+Math.floor((f.duration.departure%3600)/60)+'m' : '--';
      var link = f.deep_link || '#';
      var isFirst = i===0;

      html += '<div class="fc">' +
        '<div class="fc-top">' +
          '<div class="fc-left">' +
            '<div class="fc-times">' +
              '<div class="fc-time">'+depart+'</div>' +
              '<div class="fc-arrow">→</div>' +
              '<div class="fc-time">'+arrive+'</div>' +
            '</div>' +
            '<div class="fc-info">'+airline+' · '+dur+' · '+stopTxt+'</div>' +
          '</div>' +
          '<div class="fc-price'+(isFirst?'':' normal')+'" >$'+price+'</div>' +
        '</div>' +
        '<div class="fc-book"><a class="book-link" href="'+link+'" target="_blank" rel="noopener">🌐 Book this flight →</a></div>' +
      '</div>';
    });

    output.innerHTML = html;

  } catch(err){
    status.className = '';
    btn.disabled = false;
    btn.textContent = 'Search live flights →';
    output.innerHTML = '<div class="err"><strong>Connection failed</strong><p>' + err.message + '</p></div>';
  }
}
</script>
</body>
</html>
