async function fetchFlights(orig, dst, date, pax) {
  var params = new URLSearchParams({
    source: 'Airport:' + orig,
    destination: 'Airport:' + dst,
    outboundDepartmentDateStart: date + 'T00:00:00',
    currency: 'usd', locale: 'en',
    adults: pax, children: '0', infants: '0',
    handbags: '1', holdbags: '0',
    cabinClass: 'ECONOMY', sortBy: 'QUALITY',
    applyMixedClasses: 'true',
    allowChangeInboundDestination: 'true',
    allowChangeInboundSource: 'true',
    allowDifferentStationConnection: 'true',
    enableSelfTransfer: 'true',
    allowOvernightStopover: 'true',
    enableTrueHiddenCity: 'true',
    allowReturnToDifferentCity: 'false',
    allowReturnFromDifferentCity: 'false',
    enableThrowAwayTicketing: 'true',
    outbound: 'SUNDAY,MONDAY,TUESDAY,WEDNESDAY,THURSDAY,FRIDAY,SATURDAY',
    transportTypes: 'FLIGHT',
    contentProviders: 'FLIXBUS_DIRECTS,FRESH,KAYAK,KIWI',
    limit: '8'
  });
  var res = await fetch(KIWI_BASE + '/one-way?' + params.toString(), {
    method: 'GET',
    headers: { 'x-rapidapi-host': KIWI_HOST, 'x-rapidapi-key': KIWI_KEY }
  });
  if (!res.ok) throw new Error('Flight API error ' + res.status);
  return await res.json();
}

async function fetchCOL(city, country) {
  var params = new URLSearchParams({ city_name: city, country_name: country });
  var res = await fetch(COL_BASE + '/prices?' + params.toString(), {
    method: 'GET',
    headers: { 'x-rapidapi-host': COL_HOST, 'x-rapidapi-key': COL_KEY }
  });
  if (!res.ok) throw new Error('COL API error ' + res.status);
  return await res.json();
}

function parseItineraries(data) {
  var its = [];
  if (data && Array.isArray(data.itineraries)) its = data.itineraries;
  else if (data && data.data && Array.isArray(data.data.itineraries)) its = data.data.itineraries;
  else if (data && data.metadata && Array.isArray(data.metadata.itineraries)) its = data.metadata.itineraries;
  var results = [];
  for (var i = 0; i < its.length; i++) {
    var f = its[i];
    var price = f.price && f.price.amount ? Math.round(parseFloat(f.price.amount)) : 0;
    if (price <= 0) continue;
    var durSecs = f.duration || 0;
    var dur = durSecs > 0 ? Math.floor(durSecs/3600)+'h '+Math.floor((durSecs%3600)/60)+'m' : '--';
    var airline = (f.provider && f.provider.name) ? f.provider.name : 'Unknown airline';
    results.push({ price: price, airline: airline, duration: dur, isBest: results.length === 0 });
  }
  return results;
}

function getItem(prices, name) {
  for (var i = 0; i < prices.length; i++) {
    if (prices[i].item_name === name && prices[i].usd) return prices[i];
  }
  return null;
}

function fmt(item, field) {
  if (!item || !item.usd) return '--';
  field = field || 'avg';
  var v = parseFloat(item.usd[field]);
  return isNaN(v) ? '--' : '$' + v.toFixed(2);
}

function fmtRange(item) {
  if (!item || !item.usd) return '--';
  var mn = parseFloat(item.usd.min);
  var mx = parseFloat(item.usd.max);
  if (isNaN(mn) || isNaN(mx)) return '--';
  return '$' + mn.toFixed(0) + ' – $' + mx.toFixed(0);
}

function renderCOL(data, cityName) {
  var prices = data.prices || [];
  var currency = data.exchange_rate ? 'USD' : '';

  var meal = getItem(prices, 'Meal in Inexpensive Restaurant');
  var meal2 = getItem(prices, 'Meal for 2 People, Mid-range Restaurant, Three-course');
  var beer = getItem(prices, 'Domestic Beer, 0.5 liter Draught');
  var coffee = getItem(prices, 'Cappuccino');
  var transit = getItem(prices, 'One-way Ticket, Local Transport');
  var taxi = getItem(prices, 'Taxi Start, Normal Tariff');
  var water = getItem(prices, 'Water, 1.5 liter Bottle');
  var internet = getItem(prices, 'Internet, 60 Mbps or More, Unlimited Data, Cable/ADSL');
  var rent1 = getItem(prices, 'One bedroom apartment in city centre');

  // Estimate daily budget
  var budgetLow = 0, budgetMid = 0, budgetHigh = 0;
  if (meal && meal.usd) {
    budgetLow += parseFloat(meal.usd.min) * 2;
    budgetMid += parseFloat(meal.usd.avg) * 2;
    budgetHigh += parseFloat(meal.usd.max) * 2;
  }
  if (transit && transit.usd) {
    budgetLow += parseFloat(transit.usd.min) * 2;
    budgetMid += parseFloat(transit.usd.avg) * 2;
    budgetHigh += parseFloat(transit.usd.max) * 2;
  }
  if (beer && beer.usd) {
    budgetLow += parseFloat(beer.usd.min);
    budgetMid += parseFloat(beer.usd.avg);
    budgetHigh += parseFloat(beer.usd.max);

  var html = '<div class="col-header">' +
    '<div class="col-title">Daily budget guide · ' + cityName + '</div>' +
    '<div class="col-badge">Live data</div>' +
  '</div>' +
  '<div class="col-grid">';

    { icon:'🍽', label:'Budget meal', item: meal },
    { icon:'🍷', label:'Beer (draught)', item: beer },
    { icon:'☕', label:'Cappuccino', item: coffee },
    { icon:'🚇', label:'Transit ticket', item: transit },
    { icon:'🚕', label:'Taxi start', item: taxi },
    { icon:'💧', label:'Water (1.5L)', item: water },
  ];

  for (var i = 0; i < items.length; i++) {
    var it = items[i];
    html += '<div class="col-item">' +
      '<div class="col-item-icon">' + it.icon + '</div>' +
      '<div class="col-item-label">' + it.label + '</div>' +
      '<div class="col-item-price">' + fmt(it.item) + '</div>' +
      '<div class="col-item-range">' + fmtRange(it.item) + '</div>' +
    '</div>';
  }

  html += '</div>';

  if (budgetMid > 0) {
    html += '<div class="col-daily">' +
      '<div class="col-daily-label">Estimated daily total (per person)</div>' +
      '<div class="col-budgets">' +
        '<div class="col-bud"><div class="col-bud-amt" style="color:var(--ok)">$' + Math.round(budgetLow) + '</div><div class="col-bud-lbl">Budget</div></div>' +
        '<div class="col-bud"><div class="col-bud-amt" style="color:var(--warn)">$' + Math.round(budgetMid) + '</div><div class="col-bud-lbl">Mid-range</div></div>' +
        '<div class="col-bud"><div class="col-bud-amt" style="color:var(--accent)">$' + Math.round(budgetHigh) + '</div><div class="col-bud-lbl">Comfort</div></div>' +
      '</div>' +
    '</div>';
  }

  if (rent1 && rent1.usd) {
    html += '<div style="margin-top:12px;background:var(--s2);border-radius:var(--rs);padding:12px 14px;display:flex;justify-content:space-between;align-items:center">' +
      '<div style="font-size:12px;color:var(--tx2)">🏠 1-bed apartment (city centre) / month</div>' +
      '<div style="font-family:\'Syne\',sans-serif;font-size:14px;font-weight:700;color:var(--tx)">' + fmtRange(rent1) + '</div>' +
    '</div>';
  }

  if (internet && internet.usd) {
    html += '<div style="margin-top:8px;background:var(--s2);border-radius:var(--rs);padding:12px 14px;display:flex;justify-content:space-between;align-items:center">' +
      '<div style="font-size:12px;color:var(--tx2)">📶 Internet (60Mbps, unlimited) / month</div>' +
      '<div style="font-family:\'Syne\',sans-serif;font-size:14px;font-weight:700;color:var(--tx)">' + fmtRange(internet) + '</div>' +
    '</div>';
  }

  document.getElementById('col-card').innerHTML = html;
}

async function go() {
  var origin = document.getElementById('origin').value.trim().toUpperCase().replace(/[^A-Z]/g,'');
  var dest = document.getElementById('dest').value.trim().toUpperCase().replace(/[^A-Z]/g,'');
  var date = document.getElementById('depart').value;
  var pax = document.getElementById('pax').value || '1';

  if (!origin || !dest || !date) { alert('Please fill in all fields.'); return; }

  var btn = document.getElementById('btn');
  var loading = document.getElementById('loading');
  var output = document.getElementById('output');
  var splitSection = document.getElementById('split-section');
  var resultHeader = document.getElementById('result-header');
  var colSection = document.getElementById('col-section');

  btn.disabled = true;
  btn.textContent = 'Searching...';
  loading.className = 'loading show';
  output.innerHTML = '';
  splitSection.style.display = 'none';
  resultHeader.style.display = 'none';
  colSection.style.display = 'none';
  document.getElementById('ld-msg').textContent = 'Fetching live prices for ' + origin + ' → ' + dest + '...';

  try {
    var data = await fetchFlights(origin, dest, date, pax);
    var fares = parseItineraries(data);

    loading.className = 'loading';
    btn.disabled = false;
    btn.textContent = 'Search live flights →';

    if (fares.length === 0) {
      output.innerHTML = '<div class="err"><strong>No flights found</strong><p>No results for ' + origin + ' → ' + dest + ' on ' + date + '. Try a busier route or a closer date.</p></div>';
      return;
    }

    document.getElementById('route-lbl').textContent = origin + ' → ' + dest;
    document.getElementById('fare-count').textContent = fares.length + ' live fares found';
    resultHeader.style.display = 'flex';

    var kiwiUrl = 'https://www.kiwi.com';
    var html = '';
    for (var i = 0; i < fares.length; i++) {
      var f = fares[i];
      html += '<div class="fc' + (f.isBest?' best':'') + '" style="animation-delay:' + (i*0.05) + 's">' +
        (f.isBest?'<div class="tag-best">BEST PRICE</div>':'') +
        '<div class="fc-top">' +
          '<div class="fc-left"><div class="fc-meta">' +
            '<div class="fc-airline">' + f.airline + '</div>' +
            '<div class="fc-details">' + f.duration + ' · Economy</div>' +
          '</div></div>' +
          '<div class="fc-price-block">' +
            '<div class="fc-price' + (f.isBest?' best-price':'') + '">$' + f.price + '</div>' +
            '<div class="fc-ppax">per person</div>' +
          '</div>' +
        '</div>' +
        '<div class="fc-book"><a class="book-link" href="' + kiwiUrl + '" target="_blank" rel="noopener">🌐 Search on Kiwi →</a></div>' +
      '</div>';
    }
    output.innerHTML = html;

    // Split detection
    var HUBS = {
      'BSB':['GRU'],'GRU':['LIS','MAD'],'LIS':['MAD','CDG'],
      'NAP':['FCO','MXP'],'RAK':['LIS','MAD'],'TIA':['FCO','LHR'],
      'LHR':['CDG','AMS','MAD'],'CDG':['MAD','AMS','FCO']
    };
    var hubs = HUBS[origin] || [];
    if (hubs.length > 0) detectSplit(origin, dest, date, pax, hubs[0], fares[0].price);

    // Cost of living
    var cityInfo = AIRPORT_CITIES[dest];
    if (cityInfo) {
      colSection.style.display = 'block';
      document.getElementById('col-city-name').textContent = cityInfo.city + ', ' + cityInfo.country;
      document.getElementById('col-card').innerHTML = '<div class="col-loading">Loading cost of living data for ' + cityInfo.city + '...</div>';
      try {
        var colData = await fetchCOL(cityInfo.city, cityInfo.country);
        renderCOL(colData, cityInfo.city);
      } catch(colErr) {
        document.getElementById('col-card').innerHTML = '<div class="col-loading">Cost of living data unavailable for this city.</div>';
      }
    }

  } catch(err) {
    loading.className = 'loading';
    btn.disabled = false;
    btn.textContent = 'Search live flights →';
    output.innerHTML = '<div class="err"><strong>Search failed</strong><p>' + err.message + '</p></div>';
  }
}

async function detectSplit(origin, dest, date, pax, hub, bundledPrice) {
  try {
    var l1 = await fetchFlights(origin, hub, date, pax);
    var l2 = await fetchFlights(hub, dest, date, pax);
    var leg1 = parseItineraries(l1);
    var leg2 = parseItineraries(l2);
    if (!leg1.length || !leg2.length) return;
    var splitTotal = leg1[0].price + leg2[0].price;
    var saving = bundledPrice - splitTotal;
    if (saving >= 30) {
      var s = document.getElementById('split-section');
      s.innerHTML = '<div class="split-box">' +
        '<div class="split-box-left">' +
          '<strong>✂️ Split ticket saves $' + Math.round(saving) + '</strong>' +
          '<span>' + origin + '→' + hub + ' ($' + leg1[0].price + ') + ' + hub + '→' + dest + ' ($' + leg2[0].price + ') = $' + splitTotal + ' vs bundled $' + bundledPrice + '</span>' +
        '</div>' +
        '<div class="split-amt">$' + Math.round(saving) + '</div>' +
      '</div>';
      s.style.display = 'block';
    }
  } catch(e) { console.log('Split:', e.message); }
}
